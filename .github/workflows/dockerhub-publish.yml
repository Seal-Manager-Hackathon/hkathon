name: Build and Push Docker Image

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: hkathon-deploy

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Hackathon.Presentation/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render Deploy
        if: github.ref == 'refs/heads/main'
        run: |
          curl -i -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Deploy to VPS via SSH
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/hackathon

            docker pull hackathonseal/hkathon-deploy:latest

            docker stop hkathon-deploy || true
            docker rm hkathon-deploy || true

            docker run -d \
              --name hkathon-deploy \
              --env-file .env \
              -p 8080:8080 \
              --restart unless-stopped \
              hackathonseal/hkathon-deploy:latest

            docker image prune -f
